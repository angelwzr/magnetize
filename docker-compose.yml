version: '3.8'

services:
  magnetize:
    build: .
    container_name: magnetize
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Optional: uncomment and configure below
      # - ENABLE_API=true
      # - API_KEY=your-secret-key
      # - HTTP_PROXY=http://proxy:8080
      # - HTTPS_PROXY=http://proxy:8080
    restart: unless-stopped
